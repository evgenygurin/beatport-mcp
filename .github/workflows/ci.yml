name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Hosted runners are unavailable on this account (Actions billing), so the
    # job is opt-in: it only runs when the repository variable CI_ENABLED is
    # set to "true" (Settings → Secrets and variables → Actions → Variables).
    # Until then the check reports "skipped" instead of failing red.
    if: ${{ vars.CI_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy

      - name: Test (pytest)
        run: uv run pytest -q
